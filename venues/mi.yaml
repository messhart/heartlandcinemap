# Michigan venues. Schema: see venues/README.md. IDs must be globally unique.
venues:

  # Marquee Arts runs both Ann Arbor houses on one Agile Ticketing backend and
  # one website. Their /calendar/ is a FullCalendar SPA whose events are
  # JS-injected from the Agile widget behind Incapsula, so the headless_agile
  # adapter renders it in Chromium (like Music Box), then filters to films by
  # cross-referencing the server-rendered /all-films archive and splits the two
  # buildings by venue_match on the event's .venue text.

  - id: michigan-theater-ann-arbor
    name: Michigan Theater
    city: Ann Arbor
    state: MI
    address: 603 E. Liberty St.
    zip: "48104"
    lat: 42.2795
    lng: -83.7420
    coords: approx
    tz: America/New_York
    website: https://marquee-arts.org
    listings_url: https://marquee-arts.org/
    platform: agile
    fetch_method: headless
    adapter: headless_agile
    venue_match: Michigan Theater
    nonprofit: true
    screens: 2
    programming: [arthouse, repertory, classic, documentary, first-run-indie]
    status: verified
    last_verified: 2026-07-09
    source_urls:
      - https://marquee-arts.org/michigan-theater/
      - https://marquee-arts.org/all-films
    notes: >-
      Historic 1928 movie palace (1,600+ seats main auditorium + screening
      room), operated by the Marquee Arts nonprofit. Sells via Agile Ticketing
      (org MT_3768). Also hosts concerts/live events (symphony, UMS, Sonic
      Lunch) — the adapter keeps only titles present in /all-films, dropping
      those. venue_match "Michigan Theater" also catches its "Foyer" events.
      Coords approx — verify.

  - id: state-theatre-ann-arbor
    name: State Theatre
    city: Ann Arbor
    state: MI
    address: 233 S. State St.
    zip: "48104"
    lat: 42.2790
    lng: -83.7405
    coords: approx
    tz: America/New_York
    website: https://marquee-arts.org
    listings_url: https://marquee-arts.org/
    platform: agile
    fetch_method: headless
    adapter: headless_agile
    venue_match: State Theatre
    nonprofit: true
    screens: 4
    programming: [arthouse, repertory, first-run-indie, cult, classic]
    status: verified
    last_verified: 2026-07-09
    source_urls:
      - https://marquee-arts.org/state-theatre/
      - https://marquee-arts.org/all-films
    notes: >-
      Restored 1942 Art Deco house (4 screens), Marquee Arts' second Ann Arbor
      venue. Same Agile backend and site as the Michigan; venue_match "State
      Theatre" claims only its screenings. Coords approx — verify.
