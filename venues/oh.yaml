    fetch_method: api
    adapter: unknown # deliberately unset — see notes (robots.txt)
    graphql_site_id: 75
    graphql_circuit_id: 55
    nonprofit: true
    screens: 2
    programming: [arthouse, foreign, documentary, first-run-indie]
    status: verified
    last_verified: 2026-07-06
    source_urls:
      - https://neonmovies.com
    notes: >-
      Dayton's premier arthouse (nonprofit). Filmbot's NEWER hosted product:
      React SPA + GraphQL at /graphql. The filmbot_graphql adapter works
      (verified 2026-07-06, tenant ids above), BUT their robots.txt
      explicitly disallows /graphql — so per our ground rules we DO NOT
      scrape it. Next step per the brief: email the venue and ask; flip
      adapter to filmbot_graphql if they say yes.

