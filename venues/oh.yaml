      - https://gatewayfilmcenter.org
    notes: >-
      Nonprofit (Gateway Film Foundation, 501c3), Sundance satellite venue,
      adjacent to Ohio State. Filmbot WordPress plugin exposes
      /wp-json/nj/v1/showtime/listings — one JSON call, all upcoming
      showtimes. Series like "Cult 101" appear inside movie names.
      Coords approx — verify.

