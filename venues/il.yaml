    last_verified: 2026-07-05
    source_urls:
      - https://www.musicboxtheatre.com/
      - https://musicboxtheatre.com/now-showing
    notes: >-
      Independent, operating since 1929. JS-RENDERED SPA — a raw GET returns a
      "JavaScript required" wall with NO showtime data. HARD archetype: first
      discover the JSON/XHR endpoint the page calls (devtools Network tab on
      /now-showing and /calendar) and target that; only fall back to Playwright
      if none exists. /calendar (month view) may parse more easily. Coords are
      approximate — confirm before relying on the distance filter.

