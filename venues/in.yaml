    tz: America/Indiana/Indianapolis
    website: https://cinemacenter.org
    listings_url: https://cinemacenter.eventive.org/schedule
    platform: eventive
    fetch_method: api
    adapter: eventive
    nonprofit: true
    screens: 2
    programming: [arthouse, foreign, documentary, first-run-indie]
    status: verified
    last_verified: 2026-07-06
    source_urls:
