# Candidate venues — the expansion backlog, distilled from
# venues_research_report.md. NOT scraped and NOT part of public/venues.json;
# scripts/build_venues.py emits these to public/candidates.json for the
# dashboard's "Candidate venues" panel so the backlog is visible and triaged.
#
# Move a candidate into a state file (venues/<st>.yaml) when it's ready to
# scrape; delete its entry here at that point.
#
# adapter_status:
#   ready       — a platform we already scrape; mostly a registry entry + verify
#   new-adapter — needs a new adapter (the `platform`/`note` says which backend)
#   borderline  — operating status, permanent venue, or scope needs verifying
#                 before it's worth building
#
# platform: the ticketing/showtimes backend per the report (drives the adapter).

candidates:

