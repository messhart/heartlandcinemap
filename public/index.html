<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Heartland Cinemap — Midwest arthouse showtimes</title>
<meta name="description" content="Showtimes at arthouse, independent, and repertory cinemas across the US Midwest. Free and non-commercial — tickets at each cinema's own box office.">
<link id="sitecss" rel="stylesheet" href="./style.css">
</head>
<body>

<header>
  <h1>Heartland Cinemap</h1>
  <div id="marquee-titles"></div>
</header>

<form id="controls" autocomplete="off" aria-label="Filter showtimes">
  <div class="field">
    <label for="zip">ZIP code</label>
    <input id="zip" inputmode="numeric" pattern="\d{5}" maxlength="5" placeholder="e.g. 46201">
  </div>
  <div class="field">
    <label for="radius">Within</label>
    <select id="radius">
      <option value="50">50 miles</option>
      <option value="100" selected>100 miles</option>
      <option value="200">200 miles</option>
    </select>
  </div>
  <div class="field">
    <label for="days">When</label>
    <select id="days">
      <option value="7" selected>Next 7 days</option>
      <option value="30">Next 30 days</option>
      <option value="60">Next 60 days</option>
      <option value="all">All dates</option>
    </select>
  </div>
  <div class="field">
    <label for="view">View</label>
    <select id="view">
      <option value="day" selected>By day</option>
      <option value="film">By film</option>
    </select>
  </div>
  <div class="field">
    <label for="tz">Times in</label>
    <select id="tz">
      <option value="auto" selected>Auto</option>
      <option value="venue">Venue local</option>
      <option value="ct">Central</option>
      <option value="et">Eastern</option>
    </select>
  </div>
</form>

<section id="mapsec">
  <button id="maptoggle" type="button">Show map ▾</button>
  <a id="abouttoggle" href="./about.html">About</a>
  <button id="postertoggle" type="button">Print calendar</button>
  <span id="plancount" hidden></span>
  <p id="maphint" hidden>Click a venue for its next screenings · click anywhere
  else on the map to search from there.</p>
  <div id="map" hidden></div>
</section>

<p id="status" role="status"></p>

<main id="listings">
  <noscript><p>This site needs JavaScript to filter and sort showtimes.
  The raw data is public: <a href="./showtimes.json">showtimes.json</a> and
  <a href="./venues.json">venues.json</a>.</p></noscript>
</main>

<div id="posterwrap" hidden>
  <div id="postertools">
    <span id="posterinfo"></span>
    <button id="posterbw" type="button">Switch to B&amp;W</button>
    <button id="posterprint" type="button">Print / save PDF</button>
    <button id="postercal" type="button">Add picks to calendar (.ics)</button>
    <button id="posterclose" type="button">Close ✕</button>
  </div>
  <div id="poster"><div id="posterpages"></div></div>
</div>

<script src="./app.js"></script>
</body>
</html>
